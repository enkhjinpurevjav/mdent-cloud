version: "3.9"

services:
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RUN_SEED=${RUN_SEED:-false}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DISABLE_AUTH=${DISABLE_AUTH:-false}
      - DISABLE_API_RATE_LIMIT=${DISABLE_API_RATE_LIMIT:-true}
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - APP_URL=${APP_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - POSAPI_BASE_URL=${POSAPI_BASE_URL}
      - POSAPI_MERCHANT_TIN=37900846788
      - POSAPI_POS_NO=10013198
      - POSAPI_BRANCH_NO=001
      - POSAPI_DISTRICT_CODE=2501
      - POSAPI_CONSUMER_NO=${POSAPI_CONSUMER_NO}
    depends_on:
      - postgres-dev
    networks:
      - mdent-dev-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    ports:
      - "8083:8080"
    volumes:
      - media_data_dev:/data/media

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL}
        - NEXT_PUBLIC_CAPTCHA_KEY=${NEXT_PUBLIC_CAPTCHA_KEY}
        - NEXT_PUBLIC_BOOKING_FLOW_VERSION=${NEXT_PUBLIC_BOOKING_FLOW_VERSION}
    networks:
      - mdent-dev-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    ports:
      - "3001:3000"

  postgres-dev:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - mdent-dev-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s


networks:
  mdent-dev-net: {}

volumes:
  pg_data_dev:
  media_data_dev:

