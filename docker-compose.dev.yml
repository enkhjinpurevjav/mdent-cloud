version: "3.9"

services:
  backend:
    container_name: mdent-dev-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      RUN_SEED: "false"
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DISABLE_AUTH: "true"
      JWT_SECRET: ${JWT_SECRET}

      # Keep dev cookies host-only (do NOT share with prod)
      COOKIE_DOMAIN: ""

      CORS_ORIGIN: ${CORS_ORIGIN}
      APP_URL: ${APP_URL}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}

      POSAPI_BASE_URL: ${POSAPI_BASE_URL}
      POSAPI_MERCHANT_TIN: "37900846788"
      POSAPI_POS_NO: "10013198"
      POSAPI_BRANCH_NO: "001"
      POSAPI_DISTRICT_CODE: "2501"
    # No published ports: dev is only reachable via https://dev.mdent.cloud through prod Caddy
    networks:
      - mdent-dev-net
      - mdent_shared
    restart: unless-stopped
    volumes:
      - media_data_dev:/data/media

  frontend:
    container_name: mdent-dev-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL}
    # No published ports: dev is only reachable via https://dev.mdent.cloud through prod Caddy
    networks:
      - mdent-dev-net
      - mdent_shared
    restart: unless-stopped

  dev-proxy:
    image: caddy:2
    container_name: mdent-dev-proxy
    command: ["caddy","run","--config","/etc/caddy/Caddyfile","--adapter","caddyfile"]
    volumes:
      # Create this file in your repo: ./caddy/dev/Caddyfile
      - ./caddy/dev/Caddyfile:/etc/caddy/Caddyfile:ro
    # No published ports: only prod Caddy reaches this over the shared docker network
    networks:
      - mdent_shared
    restart: unless-stopped

networks:
  mdent-dev-net: {}
  mdent_shared:
    external: true

volumes:
  media_data_dev:
