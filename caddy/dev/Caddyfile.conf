{
  # Email not required for custom port dev, but safe to keep
  email youremail@domain.com
}

# -------------------------
# DEV FRONTEND (via 8088 → :80)
# http://dev.mdent.cloud:8088
# -------------------------
:80 {
  route {
    # API → backend (SSE safe)
    @api path /api/*
    handle @api {
      reverse_proxy backend-dev:8080 {
        flush_interval -1
      }
    }

    # Media
    @media path /media/*
    handle @media {
      reverse_proxy backend-dev:8080
    }

    # Frontend fallback
    handle {
      encode gzip
      reverse_proxy frontend-dev:3000
    }
  }
}

# -------------------------
# DEV API (via 8089 → :81)
# http://dev-api.mdent.cloud:8089
# -------------------------
:81 {
  route {
    # CORS preflight
    @cors_preflight {
      method OPTIONS
      path /api/*
    }

    handle @cors_preflight {
      header {
        Access-Control-Allow-Origin *
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
      respond "" 204
    }

    # API → backend (SSE safe)
    @api path /api/*
    handle @api {
      reverse_proxy backend-dev:8080 {
        flush_interval -1
      }

      header {
        Access-Control-Allow-Origin *
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
    }

    handle {
      respond "Not found" 404
    }
  }
}
