  email youremail@domain.com
}

# -------------------------
# DEV FRONTEND
# Browser: http://dev.mdent.cloud:8088
# Docker:  8088 -> caddy :80
# -------------------------
:80 {
  route {
    @api path /api/*
    handle @api {
      reverse_proxy backend-dev:8080 {
        flush_interval -1
      }
    }

    @media path /media/*
    handle @media {
      reverse_proxy backend-dev:8080
    }

    handle {
      encode gzip
      reverse_proxy frontend-dev:3000
    }
  }
}

# -------------------------
# DEV API
# Browser: http://dev-api.mdent.cloud:8089
# Docker:  8089 -> caddy :81
# -------------------------
:81 {
  route {
    @health path /health
    handle @health {
      reverse_proxy backend-dev:8080
    }

    @cors_preflight {
      method OPTIONS
      path /api/*
    }

    handle @cors_preflight {
      header {
        Access-Control-Allow-Origin *
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
      respond "" 204
    }

    @api path /api/*
    handle @api {
      reverse_proxy backend-dev:8080 {
        flush_interval -1
      }

      header {
        Access-Control-Allow-Origin *
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
    }

    handle {
      respond "Not found" 404
    }
  }
}
