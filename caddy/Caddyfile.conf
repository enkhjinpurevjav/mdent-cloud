{
  email youremail@domain.com
}

# -------------------------
# PRODUCTION: Main web app (frontend) + API + media
# -------------------------
mdent.cloud, www.mdent.cloud, app.mdent.cloud {
  route {
    # API must be handled BEFORE frontend fallback (NO gzip -> SSE safe)
    @api path /api/*
    handle @api {
      reverse_proxy backend:8080
    }

    # Media must be handled
    @media path /media/*
    handle @media {
      reverse_proxy backend:8080
    }

    # Fallback: everything else to frontend (gzip OK)
    handle {
      encode gzip
      reverse_proxy frontend:3000
    }
  }
}

# -------------------------
# PRODUCTION: Booking / doctor UI
# -------------------------
book.mdent.cloud {
  encode gzip
  reverse_proxy frontend:3000
}

# -------------------------
# PRODUCTION: Public API (direct API subdomain)
# -------------------------
api.mdent.cloud {
  route {
    # CORS preflight for /api/* (OPTIONS)
    @cors_preflight {
      method OPTIONS
      path /api/*
    }

    handle @cors_preflight {
      header {
        Access-Control-Allow-Origin https://mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
      respond "" 204
    }

    # All other /api/* requests → backend API (NO gzip -> SSE safe)
    @api path /api/*
    handle @api {
      reverse_proxy backend:8080

      # CORS headers for normal API responses
      header {
        Access-Control-Allow-Origin https://mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
    }

    handle {
      respond "Not found" 404
    }
  }
}

# -------------------------
# DEV: portal (frontend + /api + /media)
# -------------------------
dev.mdent.cloud {
  route {
    @api path /api/*
    handle @api {
      reverse_proxy mdent_dev-backend-1:8080
    }

    @media path /media/*
    handle @media {
      reverse_proxy mdent_dev-backend-1:8080
    }

    handle {
      encode gzip
      reverse_proxy mdent_dev-frontend-1:3000
    }
  }
}

# -------------------------
# DEV: API subdomain (optional but recommended)
# -------------------------
dev-api.mdent.cloud {
  route {
    @cors_preflight {
      method OPTIONS
      path /api/*
    }

    handle @cors_preflight {
      header {
        Access-Control-Allow-Origin https://dev.mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
      respond "" 204
    }

    @api path /api/*
    handle @api {
      reverse_proxy mdent_dev-backend-1:8080

      header {
        Access-Control-Allow-Origin https://dev.mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
    }

    handle {
      respond "Not found" 404
    }
  }
}
