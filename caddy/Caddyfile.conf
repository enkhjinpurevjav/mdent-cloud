{
  email youremail@domain.com
}

# -------------------------
# PRODUCTION: Main web app (frontend) + API + media
# -------------------------
mdent.cloud, www.mdent.cloud, app.mdent.cloud {
  route {
    # API must be handled BEFORE frontend fallback (SSE: no gzip + flush)
    @api path /api/*
    handle @api {
      reverse_proxy backend:8080 {
        flush_interval -1
      }
    }

    # Media must be handled
    @media path /media/*
    handle @media {
      reverse_proxy backend:8080
    }

    # Fallback: everything else to frontend (gzip OK)
    handle {
      encode gzip
      reverse_proxy frontend:3000
    }
  }
}

# -------------------------
# PRODUCTION: Booking / doctor UI
# -------------------------
book.mdent.cloud {
  encode gzip
  reverse_proxy frontend:3000
}

# -------------------------
# PRODUCTION: Public API (direct API subdomain)
# -------------------------
api.mdent.cloud {
  route {
    # CORS preflight for /api/* (OPTIONS)
    @cors_preflight {
      method OPTIONS
      path /api/*
    }

    handle @cors_preflight {
      header {
        Access-Control-Allow-Origin https://mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
      respond "" 204
    }

    # All other /api/* requests → backend API (SSE: no gzip + flush)
    @api path /api/*
    handle @api {
      reverse_proxy backend:8080 {
        flush_interval -1
      }

      # CORS headers for normal API responses
      header {
        Access-Control-Allow-Origin https://mdent.cloud
        Access-Control-Allow-Methods GET,POST,PUT,PATCH,DELETE,OPTIONS
        Access-Control-Allow-Headers Authorization,Content-Type
        Access-Control-Allow-Credentials true
        Access-Control-Max-Age 86400
      }
    }

    handle {
      respond "Not found" 404
    }
  }
}

# DEV: stable pointer only (all dev routing lives behind mdent-dev-proxy)
dev.mdent.cloud {
  reverse_proxy mdent-dev-proxy:9000
}
